<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Editeur d'animations - Matrice LED</title>
<style>
  :root {
    --bg: #1b1d23;
    --panel: #262933;
    --border: #3a3f4b;
    --text: #e6e8ee;
    --muted: #9098a8;
    --accent: #ffb020;
    --on: #ffb020;
    --off: #33363f;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 24px;
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 900px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .controls { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 12px; color: var(--muted); }
  input[type=number], input[type=text] {
    background: #14161b;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 14px;
  }
  input[type=number] { width: 70px; }
  input[type=text] { width: 260px; }
  button {
    background: var(--accent);
    color: #1b1d23;
    border: none;
    border-radius: 4px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    font-weight: 400;
  }
  button:active { transform: translateY(1px); }

  #gridWrap {
    overflow-x: auto;
    padding: 12px 0;
  }
  #grid {
    display: inline-grid;
    gap: 2px;
    background: var(--border);
    padding: 2px;
    border-radius: 4px;
    touch-action: none;
    user-select: none;
  }
  .cell {
    width: 22px;
    height: 22px;
    background: var(--off);
    cursor: pointer;
  }
  .cell.on { background: var(--on); }
  .blockSep { border-right: 2px solid var(--accent); }

  textarea#output {
    width: 100%;
    min-height: 90px;
    background: #14161b;
    color: #c7f0c2;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: "Consolas", monospace;
    font-size: 13px;
    padding: 10px;
    resize: vertical;
  }
  .row { display: flex; gap: 10px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  #copyStatus { font-size: 13px; color: var(--muted); }

  #frameList { display: flex; gap: 8px; flex-wrap: wrap; }
  .frameItem {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    background: #14161b;
  }
  .frameItem.active { border-color: var(--accent); }
  .frameItem .frameLabel { font-size: 11px; color: var(--muted); }
  .frameItem.active .frameLabel { color: var(--text); }
  .frameThumb { image-rendering: pixelated; background: var(--off); }

  #previewWrap { padding: 12px 0; }
  #previewCanvas { image-rendering: pixelated; background: var(--off); border-radius: 4px; }
</style>
</head>
<body>
<div id="app">

<h1>Editeur d'animations - Matrice LED</h1>
<p class="sub">Etape 3/3 : previsualiser l'animation et sauvegarder le travail localement. Un octet par colonne, bit 0 = ligne du haut (meme convention que le sketch MatriceLED.ino).</p>

<div class="panel">
  <div class="controls">
    <div class="field">
      <label for="numBlocks">Nombre de blocs (8 colonnes chacun)</label>
      <input type="number" id="numBlocks" min="1" max="8" value="3">
    </div>
    <button class="secondary" id="applySize">Appliquer la taille</button>
    <button class="secondary" id="clearBtn">Effacer</button>
    <button class="secondary" id="invertBtn">Inverser</button>
  </div>
</div>

<div class="panel">
  <div id="gridWrap">
    <div id="grid"></div>
  </div>
</div>

<div class="panel">
  <div class="controls" style="margin-bottom: 12px;">
    <button id="addFrameBtn">+ Ajouter une frame</button>
    <button class="secondary" id="dupFrameBtn">Dupliquer</button>
    <button class="secondary" id="delFrameBtn">Supprimer</button>
    <button class="secondary" id="moveLeftBtn">&larr; Monter</button>
    <button class="secondary" id="moveRightBtn">Descendre &rarr;</button>
  </div>
  <div id="frameList"></div>
</div>

<div class="panel">
  <div class="controls">
    <div class="field">
      <label for="varName">Nom de base du tableau C</label>
      <input type="text" id="varName" value="monAnimation">
    </div>
    <button id="genBtn">Generer le code</button>
  </div>
  <div class="row">
    <textarea id="output" placeholder="Le tableau C apparaitra ici (ou collez-en un pour le charger dans la grille)..."></textarea>
  </div>
  <div class="row">
    <button class="secondary" id="copyBtn">Copier</button>
    <span id="copyStatus"></span>
  </div>
  <div class="row">
    <button class="secondary" id="loadBtn">Charger dans la frame courante</button>
    <span id="loadStatus"></span>
  </div>
</div>

<div class="panel">
  <div class="controls">
    <button id="playBtn">&#9654; Lire</button>
    <div class="field">
      <label for="fps">Vitesse (images/s)</label>
      <input type="number" id="fps" min="1" max="30" value="4">
    </div>
  </div>
  <div id="previewWrap">
    <canvas id="previewCanvas"></canvas>
  </div>
</div>

<div class="panel">
  <div class="controls">
    <button id="saveBtn">Sauvegarder localement</button>
    <button class="secondary" id="loadSavedBtn">Charger la sauvegarde</button>
    <span id="saveStatus"></span>
  </div>
  <div class="row">
    <button id="exportFileBtn">Exporter en fichier (.anim)</button>
    <button class="secondary" id="importFileBtn">Importer un fichier</button>
    <input type="file" id="importFileInput" accept=".anim,.txt" style="display:none;">
    <span id="exportStatus"></span>
  </div>
</div>

</div>
<script>
const ROWS = 8;
let cols = 24; // 3 blocs x 8 par defaut, comme le sketch actuel
let frames = []; // frames[i] = pixels[row][col] = 0/1
let currentFrame = 0;

function makeEmptyPixels(c) {
  const p = [];
  for (let r = 0; r < ROWS; r++) p.push(new Array(c).fill(0));
  return p;
}

function clonePixels(p) {
  return p.map(row => row.slice());
}

function pixels() {
  return frames[currentFrame];
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${cols}, 22px)`;
  grid.style.gridTemplateRows = `repeat(${ROWS}, 22px)`;

  const px = pixels();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (px[r][c]) cell.classList.add('on');
      if (c < cols - 1 && (c + 1) % 8 === 0) cell.classList.add('blockSep');
      cell.dataset.row = r;
      cell.dataset.col = c;
      grid.appendChild(cell);
    }
  }
}

function setCell(r, c, value) {
  if (r < 0 || r >= ROWS || c < 0 || c >= cols) return;
  pixels()[r][c] = value ? 1 : 0;
  const el = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
  if (el) el.classList.toggle('on', !!value);
}

// --- Miniatures / liste des frames ---
function frameToDataURL(px, scale) {
  const canvas = document.createElement('canvas');
  canvas.width = cols;
  canvas.height = ROWS;
  const ctx = canvas.getContext('2d');
  const offColor = getComputedStyle(document.documentElement).getPropertyValue('--off').trim();
  const onColor = getComputedStyle(document.documentElement).getPropertyValue('--on').trim();
  ctx.fillStyle = offColor;
  ctx.fillRect(0, 0, cols, ROWS);
  ctx.fillStyle = onColor;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < cols; c++)
      if (px[r][c]) ctx.fillRect(c, r, 1, 1);
  return canvas.toDataURL();
}

function buildFrameList() {
  const list = document.getElementById('frameList');
  list.innerHTML = '';
  const scale = 4;
  frames.forEach((px, i) => {
    const item = document.createElement('div');
    item.className = 'frameItem' + (i === currentFrame ? ' active' : '');
    const img = document.createElement('img');
    img.className = 'frameThumb';
    img.src = frameToDataURL(px, scale);
    img.width = cols * scale;
    img.height = ROWS * scale;
    const label = document.createElement('div');
    label.className = 'frameLabel';
    label.textContent = `Frame ${i + 1}`;
    item.appendChild(img);
    item.appendChild(label);
    item.addEventListener('click', () => selectFrame(i));
    list.appendChild(item);
  });
}

function selectFrame(i) {
  if (i < 0 || i >= frames.length) return;
  currentFrame = i;
  buildGrid();
  buildFrameList();
}

function refreshAll() {
  buildGrid();
  buildFrameList();
  if (!playing) drawPreviewFrame(currentFrame);
}

// --- Dessin (souris + tactile) ---
let painting = false;
let paintValue = 1;

function cellFromPoint(x, y) {
  const el = document.elementFromPoint(x, y);
  if (el && el.classList.contains('cell')) return el;
  return null;
}

document.getElementById('grid').addEventListener('pointerdown', (e) => {
  const cell = cellFromPoint(e.clientX, e.clientY);
  if (!cell) return;
  const r = +cell.dataset.row, c = +cell.dataset.col;
  paintValue = pixels()[r][c] ? 0 : 1;
  painting = true;
  setCell(r, c, paintValue);
  e.preventDefault();
});

document.addEventListener('pointermove', (e) => {
  if (!painting) return;
  const cell = cellFromPoint(e.clientX, e.clientY);
  if (!cell) return;
  setCell(+cell.dataset.row, +cell.dataset.col, paintValue);
});

document.addEventListener('pointerup', () => {
  if (painting) buildFrameList();
  painting = false;
});

// --- Controles taille / effacer / inverser ---
document.getElementById('applySize').addEventListener('click', () => {
  const n = Math.max(1, Math.min(8, +document.getElementById('numBlocks').value || 3));
  const newCols = n * 8;
  const copyCols = Math.min(cols, newCols);
  frames = frames.map(px => {
    const newPx = makeEmptyPixels(newCols);
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < copyCols; c++)
        newPx[r][c] = px[r][c];
    return newPx;
  });
  cols = newCols;
  refreshAll();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  frames[currentFrame] = makeEmptyPixels(cols);
  refreshAll();
});

document.getElementById('invertBtn').addEventListener('click', () => {
  const px = pixels();
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < cols; c++)
      px[r][c] = px[r][c] ? 0 : 1;
  refreshAll();
});

// --- Gestion des frames ---
document.getElementById('addFrameBtn').addEventListener('click', () => {
  frames.splice(currentFrame + 1, 0, makeEmptyPixels(cols));
  currentFrame++;
  refreshAll();
});

document.getElementById('dupFrameBtn').addEventListener('click', () => {
  frames.splice(currentFrame + 1, 0, clonePixels(frames[currentFrame]));
  currentFrame++;
  refreshAll();
});

document.getElementById('delFrameBtn').addEventListener('click', () => {
  if (frames.length <= 1) return;
  frames.splice(currentFrame, 1);
  if (currentFrame >= frames.length) currentFrame = frames.length - 1;
  refreshAll();
});

document.getElementById('moveLeftBtn').addEventListener('click', () => {
  if (currentFrame <= 0) return;
  const tmp = frames[currentFrame - 1];
  frames[currentFrame - 1] = frames[currentFrame];
  frames[currentFrame] = tmp;
  currentFrame--;
  refreshAll();
});

document.getElementById('moveRightBtn').addEventListener('click', () => {
  if (currentFrame >= frames.length - 1) return;
  const tmp = frames[currentFrame + 1];
  frames[currentFrame + 1] = frames[currentFrame];
  frames[currentFrame] = tmp;
  currentFrame++;
  refreshAll();
});

// --- Generation / chargement du code ---
function pixelsToBytes(px) {
  const bytes = [];
  for (let c = 0; c < cols; c++) {
    let b = 0;
    for (let r = 0; r < ROWS; r++) if (px[r][c]) b |= (1 << r);
    bytes.push(b);
  }
  return bytes;
}

function bytesToHexList(bytes) {
  return bytes.map(b => '0x' + b.toString(16).padStart(2, '0').toUpperCase()).join(', ');
}

document.getElementById('genBtn').addEventListener('click', () => {
  const baseName = (document.getElementById('varName').value.trim() || 'monAnimation')
    .replace(/_?frame\d*$/i, '');

  let code = '';
  if (frames.length === 1) {
    code = `const uint8_t ${baseName}[${cols}] = { ${bytesToHexList(pixelsToBytes(frames[0]))} };`;
  } else {
    const frameNames = frames.map((_, i) => `${baseName}_frame${i + 1}`);
    frames.forEach((px, i) => {
      code += `const uint8_t ${frameNames[i]}[${cols}] = { ${bytesToHexList(pixelsToBytes(px))} };\n`;
    });
    code += `const uint8_t* const ${baseName}_frames[] = { ${frameNames.join(', ')} };\n`;
    code += `const uint8_t ${baseName}_numFrames = ${frames.length};`;
  }

  document.getElementById('output').value = code;
  document.getElementById('copyStatus').textContent = '';
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const out = document.getElementById('output');
  if (!out.value) return;
  navigator.clipboard.writeText(out.value).then(() => {
    document.getElementById('copyStatus').textContent = 'Copie dans le presse-papiers !';
  }).catch(() => {
    out.select();
    document.execCommand('copy');
    document.getElementById('copyStatus').textContent = 'Copie dans le presse-papiers !';
  });
});

document.getElementById('loadBtn').addEventListener('click', () => {
  const statusEl = document.getElementById('loadStatus');
  const text = document.getElementById('output').value;

  // Extrait le nom de variable, si present
  const nameMatch = text.match(/\b([A-Za-z_]\w*)\s*\[/);
  if (nameMatch) document.getElementById('varName').value = nameMatch[1].replace(/_?frame\d*$/i, '');

  // Extrait le contenu entre { }
  const braceMatch = text.match(/\{([^{}]*)\}/);
  if (!braceMatch) {
    statusEl.textContent = 'Aucun tableau trouve dans le texte.';
    return;
  }

  const tokens = braceMatch[1].split(',').map(t => t.trim()).filter(t => t.length > 0);
  if (tokens.length === 0) {
    statusEl.textContent = 'Tableau vide.';
    return;
  }

  const bytes = [];
  for (const tok of tokens) {
    const v = Number(tok);
    if (Number.isNaN(v)) {
      statusEl.textContent = `Valeur invalide : "${tok}"`;
      return;
    }
    bytes.push(v & 0xFF);
  }

  const n = Math.max(1, Math.min(8, Math.ceil(bytes.length / 8)));
  cols = n * 8;
  document.getElementById('numBlocks').value = n;
  const newPx = makeEmptyPixels(cols);
  for (let c = 0; c < bytes.length && c < cols; c++) {
    for (let r = 0; r < ROWS; r++) {
      newPx[r][c] = (bytes[c] >> r) & 1;
    }
  }
  frames[currentFrame] = newPx;
  refreshAll();
  statusEl.textContent = `Charge dans la frame ${currentFrame + 1} : ${bytes.length} colonne(s).`;
});

// --- Apercu anime ---
const PREVIEW_SCALE = 14;
const previewCanvas = document.getElementById('previewCanvas');
const previewCtx = previewCanvas.getContext('2d');
let playing = false;
let playTimer = null;
let playFrame = 0;

function drawPreviewFrame(i) {
  const px = frames[i];
  if (!px) return;
  previewCanvas.width = cols * PREVIEW_SCALE;
  previewCanvas.height = ROWS * PREVIEW_SCALE;
  const offColor = getComputedStyle(document.documentElement).getPropertyValue('--off').trim();
  const onColor = getComputedStyle(document.documentElement).getPropertyValue('--on').trim();
  previewCtx.fillStyle = offColor;
  previewCtx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
  previewCtx.fillStyle = onColor;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < cols; c++)
      if (px[r][c]) previewCtx.fillRect(c * PREVIEW_SCALE, r * PREVIEW_SCALE, PREVIEW_SCALE, PREVIEW_SCALE);
}

function stopPlayback() {
  playing = false;
  if (playTimer) clearInterval(playTimer);
  playTimer = null;
  document.getElementById('playBtn').innerHTML = '&#9654; Lire';
  drawPreviewFrame(currentFrame);
}

function startPlayback() {
  if (frames.length < 2) {
    drawPreviewFrame(currentFrame);
    return;
  }
  playing = true;
  playFrame = currentFrame;
  document.getElementById('playBtn').innerHTML = '&#9632; Stop';
  const fps = Math.max(1, Math.min(30, +document.getElementById('fps').value || 4));
  drawPreviewFrame(playFrame);
  playTimer = setInterval(() => {
    playFrame = (playFrame + 1) % frames.length;
    drawPreviewFrame(playFrame);
  }, 1000 / fps);
}

document.getElementById('playBtn').addEventListener('click', () => {
  if (playing) stopPlayback();
  else startPlayback();
});

document.getElementById('fps').addEventListener('change', () => {
  if (playing) { stopPlayback(); startPlayback(); }
});

// --- Sauvegarde locale ---
const STORAGE_KEY = 'matriceLedAnimationEditor';

document.getElementById('saveBtn').addEventListener('click', () => {
  const data = {
    cols,
    varName: document.getElementById('varName').value,
    frames: frames.map(px => px.map(row => row.slice()))
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  document.getElementById('saveStatus').textContent = `Sauvegarde a ${new Date().toLocaleTimeString()}.`;
});

document.getElementById('loadSavedBtn').addEventListener('click', () => {
  const statusEl = document.getElementById('saveStatus');
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) {
    statusEl.textContent = 'Aucune sauvegarde trouvee.';
    return;
  }
  try {
    const data = JSON.parse(raw);
    stopPlayback();
    cols = data.cols;
    document.getElementById('numBlocks').value = cols / 8;
    document.getElementById('varName').value = data.varName || 'monAnimation';
    frames = data.frames;
    currentFrame = 0;
    refreshAll();
    statusEl.textContent = 'Sauvegarde chargee.';
  } catch (e) {
    statusEl.textContent = 'Sauvegarde corrompue.';
  }
});

// --- Export / import fichier .anim (lu par l'ESP32) ---
function buildAnimFileContent() {
  const name = document.getElementById('varName').value.trim() || 'monAnimation';
  const fps = Math.max(1, Math.min(30, +document.getElementById('fps').value || 4));
  const lines = [
    `name=${name}`,
    `cols=${cols}`,
    `rows=${ROWS}`,
    `fps=${fps}`,
  ];
  for (const px of frames) {
    lines.push('frame=' + bytesToHexList(pixelsToBytes(px)).replace(/, /g, ','));
  }
  return lines.join('\n') + '\n';
}

document.getElementById('exportFileBtn').addEventListener('click', () => {
  const name = document.getElementById('varName').value.trim() || 'monAnimation';
  const content = buildAnimFileContent();
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${name}.anim`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  document.getElementById('exportStatus').textContent = `Exporte : ${name}.anim`;
});

function parseAnimFileContent(text) {
  const result = { name: 'monAnimation', cols: 24, rows: ROWS, fps: 4, frames: [] };
  const lines = text.split(/\r?\n/);
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line || !line.includes('=')) continue;
    const idx = line.indexOf('=');
    const key = line.slice(0, idx).trim();
    const value = line.slice(idx + 1).trim();
    if (key === 'name') result.name = value;
    else if (key === 'cols') result.cols = parseInt(value, 10);
    else if (key === 'rows') result.rows = parseInt(value, 10);
    else if (key === 'fps') result.fps = parseInt(value, 10);
    else if (key === 'frame') {
      const bytes = value.split(',').map(t => t.trim()).filter(t => t.length > 0).map(t => Number(t) & 0xFF);
      result.frames.push(bytes);
    }
  }
  return result;
}

document.getElementById('importFileBtn').addEventListener('click', () => {
  document.getElementById('importFileInput').click();
});

document.getElementById('importFileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const statusEl = document.getElementById('exportStatus');
    try {
      const data = parseAnimFileContent(reader.result);
      if (data.rows !== ROWS) {
        statusEl.textContent = `Fichier incompatible (rows=${data.rows}, attendu ${ROWS}).`;
        return;
      }
      if (!data.frames.length) {
        statusEl.textContent = 'Aucune frame trouvee dans le fichier.';
        return;
      }
      stopPlayback();
      cols = data.cols;
      document.getElementById('numBlocks').value = cols / 8;
      document.getElementById('varName').value = data.name;
      document.getElementById('fps').value = data.fps;
      frames = data.frames.map(bytes => {
        const px = makeEmptyPixels(cols);
        for (let c = 0; c < bytes.length && c < cols; c++)
          for (let r = 0; r < ROWS; r++)
            px[r][c] = (bytes[c] >> r) & 1;
        return px;
      });
      currentFrame = 0;
      refreshAll();
      statusEl.textContent = `Importe : ${frames.length} frame(s).`;
    } catch (err) {
      statusEl.textContent = 'Erreur de lecture du fichier.';
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// Init
frames = [makeEmptyPixels(cols)];
refreshAll();
</script>

</body>
</html>
